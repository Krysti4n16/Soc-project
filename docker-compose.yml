services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: soc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - soc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: soc-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601"]
      interval: 30s
      timeout: 10s
      retries: 5

  detection-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-detection-engine
    command: python3 scripts/detection_engine.py
    environment:
      - ES_URL=http://elasticsearch:9200
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-net
    restart: unless-stopped

  correlation-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-correlation-engine
    command: python3 scripts/correlation_engine.py
    environment:
      - ES_URL=http://elasticsearch:9200
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-net
    restart: unless-stopped

  virustotal-checker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-virustotal
    command: >
      sh -c "while true; do
        python3 scripts/virustotal_checker.py;
        sleep 300;
      done"
    environment:
      - ES_URL=http://elasticsearch:9200
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-net
    restart: unless-stopped

volumes:
  esdata:

networks:
  soc-net:
    driver: bridge